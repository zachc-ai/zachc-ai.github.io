{% if page.bilingual %}
<style>
.post-title { display: none; }
.bilingual-title { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; line-height: 1.25; }
</style>

<div class="bilingual-title">
<span class="lang-en">{{ page.title }}</span>
<span class="lang-zh">{{ page.title_zh | default: page.title }}</span>
</div>
{% endif %}
