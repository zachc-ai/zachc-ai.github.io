title: ZC's Blog
description: Tech and life, one post at a time.
url: "https://fighter-zc.github.io"
baseurl: ""

theme: minima

permalink: /blog/:title/

minima:
  skin: auto
  social_links:
    - platform: github
      user_url: "https://github.com/Fighter-ZC"

header_pages:
  - blog.md
  - digests.md
  - tags.md
  - about.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

author:
  name: ZC

# Giscus comments — fill in after enabling GitHub Discussions
# 1. Go to https://github.com/Fighter-ZC/Fighter-ZC.github.io/settings → Features → enable Discussions
# 2. Go to https://giscus.app and fill in your repo to get repo_id, category, and category_id
# 3. Uncomment and fill in the values below:
